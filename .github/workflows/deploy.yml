name: Build and Deploy to AKS

on:
  push:
    branches: [ master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Login to ACR
      uses: docker/login-action@v2
      with:
        registry: ${{ secrets.ACR_LOGIN_SERVER }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v2
      with:
        platforms: arm64

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build and push backend
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        push: true
        tags: ${{ secrets.ACR_LOGIN_SERVER }}/backend:v4
        platforms: linux/arm64

    - name: Build and push frontend
      uses: docker/build-push-action@v4
      with:
        context: ./frontend
        push: true
        tags: ${{ secrets.ACR_LOGIN_SERVER }}/frontend:v4
        platforms: linux/arm64
        build-args: |
          REACT_APP_API_URL=http://48.192.178.39:8000

    - name: Set AKS context
      uses: azure/aks-set-context@v3
      with:
        resource-group: rg-railway-agent
        cluster-name: railway-agent-aks

    - name: Update deployments to use v4 images
      run: |
        kubectl set image deployment/backend backend=${{ secrets.ACR_LOGIN_SERVER }}/backend:v4
        kubectl set image deployment/frontend frontend=${{ secrets.ACR_LOGIN_SERVER }}/frontend:v4
        kubectl rollout status deployment/backend
        kubectl rollout status deployment/frontend
